services:
  meshcore-llm-bot:
    build: .
    container_name: meshcore-llm-bot
    restart: unless-stopped
    environment:
      # --- MeshCore Transport (TCP shown) ---
      MESHCORE_TRANSPORT: "tcp"    # tcp | serial
      MESHCORE_HOST: "192.168.83.197"
      MESHCORE_PORT: "5000"
      # MESHCORE_SERIAL_PORT: /dev/ttyACM0 # Required if transport is serial
      # MESHCORE_SERIAL_BAUD: 115200

      # --- MeshCore Channels ---
      # Comma-separated list of channels to monitor. Replaces previously MESHCORE_CHANNEL_NAME.
      MESHCORE_CHANNELS: "#avl-ai"
      CHANNEL_SCAN_MAX: "16"

      # --- Bot Settings ---
      AI_TRIGGER: "!ai"
      MAX_REPLY_CHARS: "180"       # Max length per transmission chunk
      HISTORY_TURNS: "6"           # How many conversation turns to keep in memory
      DEDUPE_WINDOW_S: "3.0"       # Time window to ignore duplicate incoming messages
      DEBUG: "0"
      INCLUDE_REQUESTER_CONTEXT: "1" # 1=include SNR/hops in LLM prompt context, 0=hide
      PING_REPLY_TEMPLATE: "🤖 Ack {who}\n[{stats}]" # Template for '!ai ping' replies
      RECONNECT_DELAY_S: "5"       # Initial reconnect delay
      RECONNECT_MAX_DELAY_S: "60"  # Max exponential backoff delay
      # SYSTEM_PROMPT: "Optional override for default system prompt."

      # --- LLM backend Selection ---
      LLM_BACKEND: "gemini"        # gemini | ollama | openai_compat

      # --- Gemini Settings (only if LLM_BACKEND=gemini) ---
      # Requires GEMINI_API_KEY set in host environment or .env file
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GEMINI_MODEL: "gemini-3-flash-preview"

      # --- Ollama Settings (only if LLM_BACKEND=ollama) ---
      # OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # OLLAMA_MODEL: "llama3.2:latest"
      # OLLAMA_KEEP_ALIVE: "5m"

      # --- OpenAI-compatible Settings (only if LLM_BACKEND=openai_compat) ---
      # LOCAL_LLM_BASE_URL: "http://host.docker.internal:1234/v1"
      # LOCAL_LLM_MODEL: "local-model"
      # LOCAL_LLM_API_KEY: ""
      # LOCAL_LLM_TEMPERATURE: "0.3"
