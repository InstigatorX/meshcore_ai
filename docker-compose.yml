services:
  meshcore-llm-bot:
    build: .
    container_name: meshcore-llm-bot
    restart: unless-stopped
    environment:
      # --- MeshCore TCP ---
      MESHCORE_HOST: "192.168.83.197"
      MESHCORE_PORT: "5000"
      MESHCORE_CHANNEL_NAME: "#avl-ai"
      CHANNEL_SCAN_MAX: "16"

      # --- Bot ---
      AI_TRIGGER: "!ai"
      MAX_REPLY_CHARS: "180"
      HISTORY_TURNS: "6"
      DEDUPE_WINDOW_S: "3.0"
      DEBUG: "0"

      # --- LLM backend ---
      LLM_BACKEND: "gemini"   # gemini | ollama | openai_compat

      # Gemini (only if LLM_BACKEND=gemini)
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GEMINI_MODEL: "gemini-3-flash-preview"

      # Ollama (only if LLM_BACKEND=ollama)
      # OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # OLLAMA_MODEL: "llama3.2:latest"

      # OpenAI-compatible (only if LLM_BACKEND=openai_compat)
      # LOCAL_LLM_BASE_URL: "http://host.docker.internal:1234/v1"
      # LOCAL_LLM_MODEL: "local-model"
      # LOCAL_LLM_API_KEY: ""
      # LOCAL_LLM_TEMPERATURE: "0.3"
